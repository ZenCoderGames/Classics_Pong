<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="game-container">
      <header class="game-header">
        <div class="hud-card hud-card-p1">
          <span id="label-p1" class="hud-label">Player 1</span>
          <span id="lives-p1" class="hud-value hud-value-p1">3</span>
        </div>

        <div class="title-block">
          <h1 class="game-title">Pong</h1>
          <p class="game-subtitle">A Classic</p>
        </div>

        <div class="hud-card hud-card-right hud-card-p2">
          <span id="label-p2" class="hud-label">Player 2</span>
          <span id="lives-p2" class="hud-value hud-value-p2">3</span>
        </div>
      </header>

      <div class="playfield-row">
        <aside id="mobile-controls-left" class="mobile-controls-side" aria-label="Player 1 touch controls">
          <div class="mobile-controls-stack">
            <button type="button" class="control-btn control-btn-up" data-input="p1Up" aria-label="Player 1 up"></button>
            <button type="button" class="control-btn control-btn-down" data-input="p1Down" aria-label="Player 1 down"></button>
          </div>
        </aside>

        <main class="playfield-shell">
          <div class="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
          </div>

          <div id="menu-overlay" class="overlay">
            <div class="prompt-card">
              <p class="menu-heading">Choose Mode</p>
              <p class="controls-hint">Local PvP: W / S vs ↑ / ↓</p>
              <div class="menu-actions">
                <button id="pvp-btn" class="btn btn-primary" type="button">Local PvP</button>
                <button id="ai-btn" class="btn btn-secondary" type="button">vs CPU</button>
              </div>
            </div>
          </div>

          <div id="victory-overlay" class="overlay hidden">
            <div class="popup">
              <h2 id="victory-title">Victory</h2>
              <p id="victory-message">Player 1 wins!</p>
              <div class="popup-actions">
                <button id="restart-btn" class="btn btn-primary" type="button">Play Again</button>
                <button id="menu-btn" class="btn btn-secondary" type="button">Main Menu</button>
              </div>
            </div>
          </div>
        </main>

        <aside id="mobile-controls-right" class="mobile-controls-side hidden" aria-label="Player 2 touch controls">
          <div class="mobile-controls-stack">
            <button type="button" class="control-btn control-btn-up" data-input="p2Up" aria-label="Player 2 up"></button>
            <button type="button" class="control-btn control-btn-down" data-input="p2Down" aria-label="Player 2 down"></button>
          </div>
        </aside>
      </div>

      <footer class="game-footer">
        <button id="restart-menu-btn" class="btn btn-secondary game-footer-btn" type="button">Restart</button>
        <button id="music-toggle" class="music-toggle" type="button">Sound: On</button>
      </footer>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
